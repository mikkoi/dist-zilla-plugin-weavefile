name             = Dist-Zilla-Plugin-WeaveFile
author           = Mikko Koivunalho <mikkoi@cpan.org>
license          = Perl_5
copyright_holder = Mikko Koivunalho
copyright_year   = 2025
main_module      = lib/Dist/Zilla/Plugin/WeaveFile.pm
abstract         = Keep files updated in a repository by weaving them from POD documents and other files, and then testing their content.
website          = https://metacpan.org/dist/Dist-Zilla-Plugin-WeaveFile
 
[Meta::Contributors]

[MetaResources]
homepage            = https://metacpan.org/release/Dist-Zilla-Plugin-WeaveFile
bugtracker.web      = https://rt.cpan.org/Public/Dist/Display.html?Name=Dist-Zilla-Plugin-WeaveFile
bugtracker.mailto   = bug-Dist-Zilla-Plugin-WeaveFile@rt.cpan.org
repository.url      = git://github.com/mikkoi/dist-zilla-plugin-weavefile.git
repository.web      = https://github.com/mikkoi//dist-zilla-plugin-weavefile
repository.type     = git

[Keywords]
keywords = dist zilla

[@Filter]
-bundle = @MIKKOI
-version = 0.004

[Prereqs / DevelopSuggests]
Dist::Zilla::App::Command::podpreview = 0.004
App::RewriteVersion = 1.000

[Prereqs / RuntimeRequires]
perl = 5.010

[Prereqs / TestRequires]
Test::Script = 1.26
Test2::Suite = 1.302200
Test2::V1 = 1.302200
Test2::Tools::GenTemp = 1.302200

[Software::Policies / AIDisclosure]
policy_attribute = ai_tools = Claude AI, Copilot and Gemini

[Software::Policies / CodeOfConduct]
class = ContributorCovenant
version = 2.1

[Software::Policies / Contributing]
policy_attribute = ai_disclosure = 1
policy_attribute = ai_assisted = 1

[Software::Policies / License]
policy_attribute = perl_5_double_license = true

[Software::Policies / Security]
policy_attribute = url = https://github.com/mikkoi/env-dot/blob/main/SECURITY.md
policy_attribute = timeframe = 14 days
policy_attribute = perl_support_years = 10
[BumpVersionAfterRelease]

; commit source files after modification
[Git::Commit / CommitAfterBumpVersionAfterRelease] ; commit Changes (for new dev)
allow_dirty_match = (^lib/|^script/)
commit_msg = Bump version
